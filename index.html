<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Huella de Tapir</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:#000; color:#00e5ff; font-family:sans-serif; overflow:hidden; }

#screen-load {
  position:fixed; inset:0; z-index:100; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; padding:0 28px;
}
.app-title-main {
  font-family:'Rajdhani',sans-serif;
  font-weight:900; font-size:38px; letter-spacing:0;
  color:#00e5ff; text-transform:uppercase;
  line-height:1; text-align:center; display:block; width:100%;
}
.app-title-sub {
  font-family:'Rajdhani',sans-serif;
  font-weight:400; font-size:10px;
  letter-spacing:11px; padding-left:11px;
  color:#a0c8d8; text-transform:lowercase;
  text-align:center; display:block; width:100%; margin-top:1px;
}
.load-btns { width:100%; display:flex; flex-direction:column; gap:8px; }
.btn-main {
  width:100%; background:#00e5ff; color:#000; border:none; border-radius:8px;
  padding:12px; font-size:13px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; cursor:pointer; font-family:'Rajdhani',sans-serif;
  animation:btn-breathe 3s ease-in-out infinite;
}
@keyframes btn-breathe {
  0%,100%{ box-shadow:0 0 8px rgba(0,229,255,0.35); }
  50%{ box-shadow:0 0 18px rgba(0,229,255,0.75); }
}
.btn-main:active { opacity:0.8; }
.btn-sec {
  width:100%; background:none; color:#4a8898;
  border:1px solid #1a3a48; border-radius:8px;
  padding:9px; font-size:10px; font-weight:600; letter-spacing:1.5px;
  text-transform:uppercase; cursor:pointer; font-family:'Rajdhani',sans-serif;
}
.btn-sec:active { background:#001a2222; }
#load-status { font-size:9px; color:#1a5a6a; letter-spacing:1px; text-align:center; min-height:16px; font-family:'Share Tech Mono',monospace; }
.load-hint { font-size:7px; color:#1a5a6a; letter-spacing:1px; text-transform:uppercase; text-align:center; font-family:'Share Tech Mono',monospace; line-height:1.9; }
.load-logo { width:90px; display:block; margin:0 auto; mix-blend-mode:screen; opacity:0.75; }

#screen-map { display:none; position:fixed; inset:0; }
#map-canvas { position:absolute; inset:0; width:100%; height:100%; touch-action:none; }

/* CROSSHAIR */
#crosshair {
  position:absolute; top:50%; left:50%; z-index:20; pointer-events:none;
  transform:translate(-50%,-50%); width:44px; height:44px;
}
#crosshair::before { content:''; position:absolute; width:1px; height:100%; left:50%; top:0; background:rgba(255,255,255,0.7); }
#crosshair::after  { content:''; position:absolute; height:1px; width:100%; top:50%; left:0; background:rgba(255,255,255,0.7); }
.ch-ring { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:18px; height:18px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.6); }
.ch-dot  { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:4px; height:4px; border-radius:50%; background:#fff; }

#topbar {
  position:fixed; top:0; left:0; right:0; z-index:50;
  background:rgba(0,0,0,0.9); border-bottom:1px solid #0a2530;
  height:48px; display:flex; align-items:center; justify-content:space-between; padding:0 14px;
}
.topbar-title { font-size:13px; font-weight:700; letter-spacing:3px; color:#00e5ff; text-transform:uppercase; }
.gps-pill {
  font-size:10px; letter-spacing:1px; padding:4px 12px; border-radius:20px;
  border:1px solid #0a2530; color:#1a5a6a; background:none; cursor:pointer;
}
.gps-pill.on { border-color:#00ffaa55; color:#00ffaa; }

#side-btns {
  position:fixed; right:12px; bottom:92px; z-index:49;
  display:flex; flex-direction:column; gap:8px;
}
.side-btn {
  width:42px; height:42px; border-radius:10px;
  background:rgba(0,0,0,0.9); border:1px solid #0a2530;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:#1a5a6a;
}
.side-btn:active { color:#00e5ff; border-color:#00e5ff33; }

#bottombar {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  background:rgba(0,0,0,0.92); border-top:1px solid #0a2530;
  height:78px; display:flex; align-items:center; justify-content:space-around; padding:0 12px;
}
.nav-btn {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; color:#1a5a6a; cursor:pointer;
  font-size:9px; letter-spacing:1px; text-transform:uppercase; min-width:54px;
}
.nav-btn svg { width:20px; height:20px; }
.nav-btn:active { color:#00e5ff; }
#mark-btn {
  width:60px; height:60px; border-radius:50%;
  background:#000; border:2px solid #00e5ff;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:#00e5ff; flex-shrink:0;
}
#mark-btn:active { background:#001520; transform:scale(0.92); }
#mark-btn svg { width:26px; height:26px; }

/* SHEET */
#sheet {
  position:fixed; bottom:0; left:0; right:0; z-index:201;
  background:#040c10; border-top:1px solid #0a2530; border-radius:16px 16px 0 0;
  padding:0 20px 36px; transform:translateY(100%);
  transition:transform 0.26s ease; max-height:91vh; overflow-y:auto;
}
#sheet.open { transform:translateY(0); }
.handle { width:36px; height:3px; background:#0a2530; border-radius:2px; margin:12px auto 16px; }
.sh-num   { font-size:9px; color:#00e5ff; letter-spacing:2px; text-transform:uppercase; font-family:monospace; }
.sh-tramo-tag { display:inline-block; margin-top:3px; margin-bottom:2px; font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:2px 8px; border-radius:20px; border:1px solid #00e5ff33; color:#00a0c0; }
.sh-coord { font-size:10px; color:#1a5a6a; font-family:monospace; margin-bottom:16px; }
.fl { font-size:9px; color:#00e5ff; letter-spacing:2px; text-transform:uppercase; margin-bottom:7px; display:block; }

.type-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.type-chip {
  background:#0a1520; border:1px solid #0a2530; border-radius:9px;
  padding:11px 4px; display:flex; flex-direction:column; align-items:center; gap:4px;
  cursor:pointer; color:#1a5a6a; font-size:9px; letter-spacing:1px; text-transform:uppercase;
}
.type-chip svg { width:18px; height:18px; }
.type-chip:active { transform:scale(0.95); }
.type-chip.sp { border-color:#00e5ff; color:#00e5ff; background:#001520; }
.type-chip.sv { border-color:#0080ff; color:#0080ff; background:#000d1a; }
.type-chip.sb { border-color:#00ffaa; color:#00ffaa; background:#001510; }

.photo-box {
  background:#0a1520; border:1px dashed #0a2530; border-radius:9px;
  min-height:110px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; margin-bottom:13px; overflow:hidden;
}
.photo-box:active { border-color:#00e5ff33; }
.photo-box img { width:100%; height:100%; object-fit:cover; border-radius:8px; }
.photo-ph { display:flex; flex-direction:column; align-items:center; gap:5px; color:#1a5a6a; }
.photo-ph svg { width:24px; height:24px; }
.photo-ph span { font-size:9px; letter-spacing:1px; text-transform:uppercase; }

.rec-row {
  background:#0a1520; border:1px solid #0a2530; border-radius:9px;
  padding:11px 13px; display:flex; align-items:center; justify-content:space-between; margin-bottom:13px;
}
.rec-info { display:flex; align-items:center; gap:9px; }
.rec-dot { width:7px; height:7px; border-radius:50%; background:#1a5a6a; flex-shrink:0; }
.rec-dot.on { background:#ff3355; animation:rp .8s infinite; }
@keyframes rp { 0%,100%{opacity:1} 50%{opacity:.3} }
.rec-t { font-family:monospace; font-size:13px; color:#00e5ff; }
.rec-h { font-size:9px; color:#1a5a6a; letter-spacing:1px; text-transform:uppercase; }
.rec-btn {
  width:38px; height:38px; border-radius:50%; border:2px solid #ff3355;
  background:none; display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:#ff3355; flex-shrink:0;
}
.rec-btn.stop { border-color:#00ffaa; color:#00ffaa; }
.rec-btn:active { opacity:.7; }
.rec-btn svg { width:14px; height:14px; }
.player-row {
  background:#0a1520; border:1px solid #0a2530; border-radius:9px;
  padding:10px 12px; display:none; align-items:center; gap:10px; margin-bottom:13px;
}
.player-row.show { display:flex; }
.play-btn {
  width:34px; height:34px; border-radius:50%; border:1px solid #00e5ff;
  background:none; color:#00e5ff; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
}
.play-btn:active { background:#001520; }
.play-btn svg { width:12px; height:12px; }
.play-info { flex:1; }
.play-d { font-family:monospace; font-size:11px; color:#00e5ff; }
.play-bar { height:3px; background:#0a2530; border-radius:2px; margin-top:5px; }
.play-p { height:100%; background:#00e5ff; border-radius:2px; width:0%; transition:width .2s; }
.play-del { font-size:9px; color:#1a5a6a; background:none; border:none; cursor:pointer; padding:4px; letter-spacing:1px; }
.play-del:active { color:#ff3355; }

.notes-ta {
  width:100%; background:#0a1520; border:1px solid #0a2530; border-radius:9px;
  padding:10px 12px; color:#c8e8f0; font-size:14px; resize:none; min-height:58px;
  outline:none; margin-bottom:14px;
}
.notes-ta::placeholder { color:#1a5a6a; }
.notes-ta:focus { border-color:#00e5ff22; }

.sh-actions { display:flex; gap:10px; }
.btn-save {
  flex:1; background:#00e5ff; color:#000; border:none; border-radius:9px;
  padding:14px; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer;
}
.btn-save:active { opacity:.8; }
.btn-del {
  display:none; background:none; border:1px solid #ff335533; color:#ff3355;
  border-radius:9px; padding:12px 14px; font-size:9px; letter-spacing:1px; text-transform:uppercase; cursor:pointer;
}
.btn-del.show { display:block; }
.btn-del:active { background:#ff335511; }

/* SCREENS */
#screen-list, #screen-pdf {
  display:none; position:fixed; inset:0; z-index:150; background:#000; flex-direction:column;
}
#screen-list.open, #screen-pdf.open { display:flex; }
.scr-hdr {
  height:50px; background:#000; border-bottom:1px solid #0a2530;
  display:flex; align-items:center; gap:10px; padding:0 14px; flex-shrink:0;
}
.back-btn { background:none; border:none; color:#c8e8f0; cursor:pointer; padding:8px; display:flex; align-items:center; border-radius:6px; }
.back-btn:active { color:#00e5ff; }
.scr-title { font-size:13px; font-weight:700; letter-spacing:3px; color:#c8e8f0; text-transform:uppercase; flex:1; }
.scr-sub { font-size:10px; color:#1a5a6a; font-family:monospace; }

.tramo-list { flex:1; overflow-y:auto; padding:10px; }
.tg { margin-bottom:14px; }
.tg-hdr {
  font-size:9px; color:#00e5ff; letter-spacing:2px; text-transform:uppercase;
  padding:5px 8px; border-bottom:1px solid #0a2530; margin-bottom:5px;
  display:flex; justify-content:space-between;
}
.tg-hdr-c { color:#1a5a6a; }
.pt-empty { text-align:center; padding:50px 20px; color:#1a5a6a; font-size:11px; letter-spacing:2px; text-transform:uppercase; line-height:2.5; }

.pt-card {
  background:#040c10; border:1px solid #0a2530; border-radius:10px;
  padding:10px; display:flex; gap:9px; cursor:pointer; align-items:flex-start; margin-bottom:5px;
}
.pt-card:active { border-color:#00e5ff22; }
.pt-thumb {
  width:46px; height:46px; border-radius:7px; background:#0a1520;
  border:1px solid #0a2530; flex-shrink:0; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.pt-thumb img { width:100%; height:100%; object-fit:cover; }
.pt-thumb svg { width:17px; height:17px; color:#0a2530; }
.pt-info { flex:1; min-width:0; }
.pt-num  { font-size:9px; color:#00e5ff; letter-spacing:2px; font-family:monospace; margin-bottom:2px; }
.pt-note { font-size:13px; color:#c8e8f0; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pt-tags { display:flex; gap:4px; flex-wrap:wrap; }
.tag { font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:2px 6px; border-radius:20px; border:1px solid; }
.tag-p { border-color:#00e5ff33; color:#00e5ff; }
.tag-v { border-color:#0080ff33; color:#0080ff; }
.tag-b { border-color:#00ffaa33; color:#00ffaa; }
.tag-n { border-color:#0a2530; color:#1a5a6a; }
.tag-a { border-color:#0a2530; color:#334455; }

.pdf-body { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
.stat-card { background:#040c10; border:1px solid #0a2530; border-radius:10px; overflow:hidden; }
.stat-hdr  { padding:8px 13px; border-bottom:1px solid #0a2530; font-size:9px; color:#00e5ff; letter-spacing:2px; text-transform:uppercase; }
.stat-row  { display:flex; justify-content:space-between; align-items:center; padding:9px 13px; border-bottom:1px solid #0a2530; }
.stat-row:last-child { border-bottom:none; }
.stat-key  { font-size:13px; color:#1a5a6a; }
.stat-val  { font-size:18px; font-weight:700; font-family:monospace; color:#00e5ff; }
.btn-gen {
  background:#00e5ff; color:#000; border:none; border-radius:9px;
  padding:15px; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer;
}
.btn-gen:active { opacity:.8; }
.btn-new {
  background:none; border:1px solid #ff335522; color:#ff3355; border-radius:9px;
  padding:13px; font-size:10px; letter-spacing:2px; text-transform:uppercase; cursor:pointer;
}

.toast {
  position:fixed; top:58px; left:50%; transform:translateX(-50%) translateY(-8px);
  background:#040c10; border:1px solid #0a2530; border-radius:30px;
  padding:7px 16px; font-size:11px; color:#00e5ff; letter-spacing:1px;
  z-index:999; opacity:0; transition:all .2s; pointer-events:none; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.sh-dist {
  display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;
}
.dist-pill {
  font-family:monospace; font-size:10px; letter-spacing:1px;
  padding:3px 10px; border-radius:20px;
  background:#0a1520; border:1px solid #0a2530; color:#7ab0c0;
}
.dist-pill span { color:#00e5ff; font-weight:700; }
.save-bar {
  position:fixed; top:48px; left:0; right:0; z-index:49;
  height:28px; background:#001a10; border-bottom:1px solid #00ffaa22;
  display:flex; align-items:center; justify-content:center; gap:8px;
  font-family:monospace; font-size:10px; color:#00ffaa; letter-spacing:1px;
  transform:translateY(-100%); transition:transform 0.3s;
}
.save-bar.show { transform:translateY(0); }
.save-bar.warn { background:#1a0a00; border-color:#ff880022; color:#ff8800; }

.photo-opts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
.photo-opt-btn {
  background:#0a1520; border:1px solid #0a2530; border-radius:9px;
  padding:14px 8px; display:flex; flex-direction:column; align-items:center; gap:5px;
  cursor:pointer; color:#1a5a6a; font-size:9px; letter-spacing:1px; text-transform:uppercase;
}
.photo-opt-btn svg { width:20px; height:20px; }
.photo-opt-btn:active { border-color:#00e5ff33; color:#00e5ff; background:#001520; }
.photo-preview-wrap { position:relative; margin-bottom:14px; }
.photo-clear {
  position:absolute; top:6px; right:6px; width:26px; height:26px;
  background:rgba(0,0,0,0.7); border:1px solid #ff335544; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:#ff3355; font-size:14px; line-height:1;
}
.photo-clear:active { background:rgba(255,51,85,0.2); }

#overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.7); }
#overlay.open { display:block; }
</style>
</head>
<body>

<!-- LOAD -->
<div id="screen-load">
  <!-- RADAR SVG -->
  <svg width="48" height="52" viewBox="-20 -20 40 44" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;">
    <circle cx="0" cy="0" r="8"  fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.12"/>
    <circle cx="0" cy="0" fill="none" stroke="#00e5ff" stroke-width="1.2">
      <animate attributeName="r" values="2;17" dur="2.4s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="opacity" values="0.8;0" dur="2.4s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="0" cy="0" fill="none" stroke="#00e5ff" stroke-width="1">
      <animate attributeName="r" values="2;17" dur="2.4s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="opacity" values="0.5;0" dur="2.4s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <line x1="0" y1="0" x2="0" y2="-16" stroke="#00e5ff" stroke-width="1" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
    </line>
    <circle cx="0" cy="0" r="2" fill="#00e5ff"/>
    <line x1="0" y1="0" x2="0" y2="20" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
    <line x1="-6" y1="20" x2="6" y2="20" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
  </svg>

  <!-- APP NAME -->
  <div style="width:100%;text-align:center;">
    <span class="app-title-main">HUELLAS</span>
    <span class="app-title-sub">de tapir</span>
  </div>

  <!-- BUTTONS -->
  <div class="load-btns">
    <p id="load-status" class="load-hint">Cargá el KMZ de la organización<br>para comenzar el recce</p>
    <button class="btn-main" onclick="document.getElementById('kf').click()">CARGAR KMZ</button>
    <input type="file" id="kf" accept=".kmz,.kml" style="display:none" onchange="onKMZ(event)">
    <button class="btn-sec" id="btn-resume" style="display:none" onclick="resumeSession()">CONTINUAR SESIÓN</button>
  </div>

<script>
// ══ STATE ══
const ST = { points:[], nextN:1, tramos:[], kmzName:'', gpsPos:null, curPt:null, isEdit:false };
const STORE = 'tapir5';

// ══ MAP ══
const M = { lat:0, lng:0, scale:5000, rot:0, W:0, H:0, canvas:null, ctx:null, tiles:{} };

// ══ STORAGE — IndexedDB for photos, localStorage for metadata ══
const DB_NAME = 'tapir_db', DB_VER = 1, DB_STORE = 'photos';
let db = null;

function openDB() {
  return new Promise((res, rej) => {
    if (db) return res(db);
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = e => rej(e);
  });
}
function savePhoto(id, dataUrl) {
  return openDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(dataUrl, id).onsuccess = () => res();
    tx.onerror = () => rej(tx.error);
  }));
}
function loadPhoto(id) {
  return openDB().then(db => new Promise(res => {
    const req = db.transaction(DB_STORE,'readonly').objectStore(DB_STORE).get(id);
    req.onsuccess = () => res(req.result || null);
    req.onerror   = () => res(null);
  }));
}
function deletePhoto(id) {
  return openDB().then(db => new Promise(res => {
    db.transaction(DB_STORE,'readwrite').objectStore(DB_STORE).delete(id).onsuccess = () => res();
  })).catch(()=>{});
}
function deleteAllPhotos() {
  return openDB().then(db => new Promise(res => {
    db.transaction(DB_STORE,'readwrite').objectStore(DB_STORE).clear().onsuccess = () => res();
  })).catch(()=>{});
}

function persist() {
  try {
    const light = ST.tramos.map(t => ({
      name:t.name, color:t.color, route:t.routeSimple,
      start:t.start, end:t.end, bbox:t.bbox
    }));
    const pointsMeta = ST.points.map(p => {
      const {photo, audio, ...rest} = p;
      return {...rest, hasPhoto: !!photo, hasAudio: !!audio};
    });
    localStorage.setItem(STORE, JSON.stringify({
      points:pointsMeta, nextN:ST.nextN, tramos:light, kmzName:ST.kmzName
    }));
    showSaveBar('✓ GUARDADO — ' + ST.points.length + ' punto' + (ST.points.length!==1?'s':''), false);
  } catch(e) {
    console.warn('persist error:', e);
    showSaveBar('⚠ ERROR AL GUARDAR', true);
  }
}

function showSaveBar(msg, warn) {
  const bar = document.getElementById('save-bar');
  if (!bar) return;
  bar.textContent = msg;
  bar.className = 'save-bar show' + (warn ? ' warn' : '');
  clearTimeout(showSaveBar._t);
  showSaveBar._t = setTimeout(() => bar.classList.remove('show'), 2000);
}

async function persistPhoto(pt) {
  if (pt.photo) await savePhoto('photo_'+pt.id, pt.photo);
  if (pt.audio) await savePhoto('audio_'+pt.id, pt.audio);
}

async function loadStored() {
  try {
    const d = JSON.parse(localStorage.getItem(STORE));
    if (!d || !d.tramos || !d.tramos.length) return false;
    ST.nextN   = d.nextN   || 1;
    ST.kmzName = d.kmzName || '';
    ST.tramos  = d.tramos.map(t => ({...t, route:t.route, routeSimple:t.route}));
    const pts  = d.points  || [];
    for (const p of pts) {
      if (p.hasPhoto) p.photo = await loadPhoto('photo_'+p.id);
      if (p.hasAudio) p.audio = await loadPhoto('audio_'+p.id);
    }
    ST.points = pts;
    return true;
  } catch(e) { console.warn('loadStored error:', e); return false; }
}
// ══ BOOT ══
window.addEventListener('load', async () => {
  const had = await loadStored();
  if (had) {
    document.getElementById('load-status').textContent =
      ST.kmzName + ' — ' + ST.points.length + ' punto' + (ST.points.length!==1?'s':'') + ' guardados';
    document.getElementById('btn-resume').style.display = 'block';
    document.getElementById('btn-resume').textContent =
      'CONTINUAR SESIÓN — ' + ST.points.length + ' PTS';
  }
});

// ══ KMZ/KML ══
async function onKMZ(e) {
  const file = e.target.files[0]; if (!file) return;
  e.target.value = '';
  setStatus('Leyendo...');
  try {
    const buf = await file.arrayBuffer();
    const bytes = new Uint8Array(buf);
    const kmlText = (bytes[0]===0x50&&bytes[1]===0x4B) ? await unzipKML(buf) : new TextDecoder().decode(buf);
    setStatus('Procesando tramos...');
    const tramos = parseTramos(kmlText);
    if (!tramos.length) { setStatus('No se encontraron tramos con ruta'); return; }
    ST.tramos = tramos; ST.kmzName = file.name; ST.points = []; ST.nextN = 1;
    persist();
    setStatus(tramos.length + ' tramos cargados');
    setTimeout(startMap, 400);
  } catch(err) { setStatus('Error: ' + err.message); console.error(err); }
}

async function unzipKML(buf) {
  const b = new Uint8Array(buf), v = new DataView(buf);
  let eocd = -1;
  for (let i=b.length-22; i>=0; i--) {
    if (b[i]===0x50&&b[i+1]===0x4B&&b[i+2]===0x05&&b[i+3]===0x06) { eocd=i; break; }
  }
  if (eocd<0) throw new Error('ZIP inválido');
  const cnt=v.getUint16(eocd+8,true), cdo=v.getUint32(eocd+16,true);
  let pos=cdo, entry=null;
  for (let i=0;i<cnt;i++) {
    if (v.getUint32(pos,true)!==0x02014B50) break;
    const comp=v.getUint16(pos+10,true),csz=v.getUint32(pos+20,true),
          fnl=v.getUint16(pos+28,true),exl=v.getUint16(pos+30,true),
          cml=v.getUint16(pos+32,true),off=v.getUint32(pos+42,true);
    const fn=new TextDecoder().decode(b.slice(pos+46,pos+46+fnl));
    if (fn.endsWith('.kml')) entry={comp,csz,off};
    pos+=46+fnl+exl+cml;
  }
  if (!entry) throw new Error('Sin .kml en ZIP');
  const fnl2=v.getUint16(entry.off+26,true), exl2=v.getUint16(entry.off+28,true);
  const cd=b.slice(entry.off+30+fnl2+exl2, entry.off+30+fnl2+exl2+entry.csz);
  if (entry.comp===0) return new TextDecoder().decode(cd);
  if (entry.comp===8) {
    if (!window.DecompressionStream) throw new Error('Usá Chrome/Safari actual');
    const s=new DecompressionStream('deflate-raw'),w=s.writable.getWriter(),r=s.readable.getReader();
    w.write(cd); w.close();
    const chunks=[]; while(true){const{done,value}=await r.read();if(done)break;chunks.push(value);}
    const tot=chunks.reduce((a,c)=>a+c.length,0),out=new Uint8Array(tot);let o=0;
    for(const c of chunks){out.set(c,o);o+=c.length;}
    return new TextDecoder().decode(out);
  }
  throw new Error('Compresión no soportada');
}

const COLORS = ['#00e5ff','#00ffaa','#4499ff','#ffaa00','#ff44bb','#aaff44','#aa44ff'];
const SKIP   = new Set(['Mapa sin nombre','Proyecto sin título','Rutas','']);

function simplify(pts, tolerance) {
  // Douglas-Peucker simplification
  if (pts.length <= 2) return pts;
  let maxDist = 0, maxIdx = 0;
  const [p0, pN] = [pts[0], pts[pts.length-1]];
  const dx = pN[1]-p0[1], dy = pN[0]-p0[0];
  const len = Math.sqrt(dx*dx+dy*dy) || 1;
  for (let i=1; i<pts.length-1; i++) {
    const d = Math.abs(dy*(pts[i][1]-p0[1]) - dx*(pts[i][0]-p0[0])) / len;
    if (d > maxDist) { maxDist=d; maxIdx=i; }
  }
  if (maxDist > tolerance) {
    const l = simplify(pts.slice(0,maxIdx+1), tolerance);
    const r = simplify(pts.slice(maxIdx), tolerance);
    return [...l.slice(0,-1), ...r];
  }
  return [p0, pN];
}

function parseTramos(text) {
  const doc = new DOMParser().parseFromString(text, 'text/xml');
  const KML = 'http://www.opengis.net/kml/2.2';
  const nm = el => { const n=el.querySelector('name'); return n&&n.textContent?n.textContent.trim():''; };
  const coords = el => {
    const c = el.querySelector('coordinates'); if(!c||!c.textContent) return [];
    return c.textContent.trim().split(/\s+/).map(p=>{
      const parts=p.split(','); if(parts.length<2) return null;
      const lng=parseFloat(parts[0]), lat=parseFloat(parts[1]);
      return isNaN(lat)||isNaN(lng) ? null : [lat,lng];
    }).filter(Boolean);
  };

  const seen = new Set(); // deduplicate by bbox string
  const result = [];

  doc.querySelectorAll('Folder').forEach(folder => {
    const fname = nm(folder);
    if (SKIP.has(fname)) return;

    let route=[], start=null, end=null;
    folder.querySelectorAll('Placemark').forEach(pm => {
      const pmname = nm(pm);
      const hasLine  = pm.querySelector('LineString') !== null;
      const hasPoint = pm.querySelector('Point') !== null;
      const c = coords(pm);
      if (hasLine && c.length > 10 && c.length > route.length) route = c;
      if (hasPoint && c.length > 0) {
        const low = pmname.toLowerCase();
        if      (low.includes('inicio')||low.includes('start')||low.includes('largada')) start={lat:c[0][0],lng:c[0][1],name:pmname};
        else if (low.includes('final')||low.includes('fin')||low.includes('llegada')||low.includes('end'))   end={lat:c[0][0],lng:c[0][1],name:pmname};
      }
    });

    if (route.length < 5) return;

    // Deduplicate by bounding box
    const lats=route.map(p=>p[0]), lngs=route.map(p=>p[1]);
    const bbox = { minLat:Math.min(...lats), maxLat:Math.max(...lats), minLng:Math.min(...lngs), maxLng:Math.max(...lngs) };
    const bboxKey = bbox.minLat.toFixed(3)+bbox.maxLat.toFixed(3)+bbox.minLng.toFixed(3)+bbox.maxLng.toFixed(3);
    if (seen.has(bboxKey)) return;
    seen.add(bboxKey);

    result.push({ name:fname, route, routeSimple:route, start, end, bbox, color:COLORS[result.length%COLORS.length] });
  });

  // Top-level named placemarks (Shakedown, etc)
  const doc2 = doc.querySelector('Document');
  if (doc2) {
    [...doc2.children].filter(c=>c.tagName&&c.tagName.includes('Placemark')).forEach(pm=>{
      const pmname = nm(pm);
      if (!pmname || pmname.toLowerCase().includes('sin título')||pmname.toLowerCase().includes('inicio')||pmname.toLowerCase().includes('final')) return;
      if (pm.querySelector('LineString')===null) return;
      const c = coords(pm);
      if (c.length < 5) return;
      const lats=c.map(p=>p[0]),lngs=c.map(p=>p[1]);
      const bbox={minLat:Math.min(...lats),maxLat:Math.max(...lats),minLng:Math.min(...lngs),maxLng:Math.max(...lngs)};
      const bboxKey=bbox.minLat.toFixed(3)+bbox.maxLat.toFixed(3)+bbox.minLng.toFixed(3)+bbox.maxLng.toFixed(3);
      if (seen.has(bboxKey)) return;
      seen.add(bboxKey);
      result.push({name:pmname,route:c,routeSimple:c,start:null,end:null,bbox,color:COLORS[result.length%COLORS.length]});
    });
  }

  return result;
}

function setStatus(m) { document.getElementById('load-status').textContent = m; }
function resumeSession() { startMap(); }

// ══ MAP START ══
function goHome() {
  persist(); // ensure latest state is saved before leaving
  document.getElementById('screen-map').style.display='none';
  document.getElementById('screen-load').style.display='flex';
  // Update load screen to reflect current session
  const status = ST.kmzName
    ? ST.kmzName + ' — ' + ST.points.length + ' punto' + (ST.points.length!==1?'s':'') + ' guardados'
    : '';
  document.getElementById('load-status').textContent = status;
  document.getElementById('btn-resume').style.display = ST.tramos.length ? 'block' : 'none';
  if (ST.tramos.length) {
    document.getElementById('btn-resume').textContent = 'CONTINUAR SESIÓN — ' + ST.points.length + ' PTS';
  }
}

function startMap() {
  document.getElementById('screen-load').style.display='none';
  document.getElementById('screen-map').style.display='block';
  M.canvas = document.getElementById('map-canvas');
  M.ctx = M.canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  fitAll();
  initTouch();
  startGPS();
  requestAnimationFrame(loop);
}

function resizeCanvas() {
  M.W=M.canvas.width=window.innerWidth;
  M.H=M.canvas.height=window.innerHeight;
}

function fitAll() {
  const all = ST.tramos.flatMap(t=>t.route);
  if (!all.length) return;
  const lats=all.map(p=>p[0]),lngs=all.map(p=>p[1]);
  const minLat=Math.min(...lats),maxLat=Math.max(...lats),minLng=Math.min(...lngs),maxLng=Math.max(...lngs);
  M.lat=(minLat+maxLat)/2; M.lng=(minLng+maxLng)/2;
  const dLat=maxLat-minLat||0.01,dLng=maxLng-minLng||0.01;
  const cos=Math.cos(M.lat*Math.PI/180);
  const sw=(M.W||375)*0.82,sh=((M.H||667)-140)*0.82;
  M.scale=Math.min(sh/dLat, sw/(dLng*cos));
}

// ══ PROJECTION ══
function proj(lat,lng) {
  const cos=Math.cos(M.lat*Math.PI/180);
  const dx=(lng-M.lng)*M.scale*cos, dy=(lat-M.lat)*M.scale;
  const c=Math.cos(M.rot), s=Math.sin(M.rot);
  return { x: M.W/2 + dx*c + dy*s, y: M.H/2 + dx*s - dy*c };
}
function unproj(sx,sy) {
  const dx=sx-M.W/2, dy=sy-M.H/2;
  const c=Math.cos(-M.rot), s=Math.sin(-M.rot);
  const rx=dx*c-dy*s, ry=dx*s+dy*c;
  const cos=Math.cos(M.lat*Math.PI/180);
  return { lat: M.lat+ry/M.scale, lng: M.lng+rx/(M.scale*cos) };
}

// ══ DRAW ══
function loop() { draw(); requestAnimationFrame(loop); }

function draw() {
  const ctx=M.ctx;
  ctx.clearRect(0,0,M.W,M.H);
  ctx.fillStyle='#060d14'; ctx.fillRect(0,0,M.W,M.H);

  // Draw each tramo
  ST.tramos.forEach(t => {
    if (t.route.length < 2) return;
    ctx.beginPath();
    ctx.strokeStyle = t.color;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    const p0=proj(t.route[0][0],t.route[0][1]);
    ctx.moveTo(p0.x,p0.y);
    for (let i=1;i<t.route.length;i++) {
      const p=proj(t.route[i][0],t.route[i][1]);
      ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();

    // Start/end flags
    const ssNum = 'SS' + (ST.tramos.indexOf(t) + 1);
    if (t.start) drawFlag(t.start.lat, t.start.lng, true,  ssNum);
    if (t.end)   drawFlag(t.end.lat,   t.end.lng,   false, ssNum);
  });

  // User points
  ST.points.forEach(pt => drawMarker(pt));

  // GPS
  if (ST.gpsPos) {
    const {x,y}=proj(ST.gpsPos.lat,ST.gpsPos.lng);
    ctx.beginPath(); ctx.arc(x,y,11,0,Math.PI*2); ctx.fillStyle='rgba(0,229,255,0.15)'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2);  ctx.fillStyle='#00e5ff'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2);  ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.stroke();
  }
}

function drawFlag(lat, lng, isStart, ssLabel) {
  const {x, y} = proj(lat, lng);
  const ctx = M.ctx;
  const poleH = 18, flagW = 12, flagH = 8;

  // Pole
  ctx.beginPath();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.moveTo(x, y);
  ctx.lineTo(x, y - poleH);
  ctx.stroke();

  // Base dot
  ctx.beginPath();
  ctx.arc(x, y, 2.5, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  if (isStart) {
    // Solid white flag
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x, y - poleH, flagW, flagH);
  } else {
    // Checkered flag — 3x3 grid of squares
    const sq = flagW / 3;
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 3; col++) {
        const dark = (row + col) % 2 === 0;
        ctx.fillStyle = dark ? '#000000' : '#ffffff';
        ctx.fillRect(x + col*sq, y - poleH + row*(flagH/3), sq, flagH/3);
      }
    }
    // Border
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x, y - poleH, flagW, flagH);
  }

  // SS label next to flag
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(ssLabel, x + flagW + 3, y - poleH + flagH/2);
}

function drawMarker(pt) {
  const {x,y}=proj(pt.lat,pt.lng);
  const col=pt.type==='photo'?'#00e5ff':pt.type==='video'?'#0080ff':pt.type==='both'?'#00ffaa':'#334466';
  const r=15;
  M.ctx.beginPath(); M.ctx.arc(x,y,r,0,Math.PI*2); M.ctx.fillStyle=col+'20'; M.ctx.fill();
  M.ctx.beginPath(); M.ctx.arc(x,y,r,0,Math.PI*2); M.ctx.strokeStyle=col; M.ctx.lineWidth=2; M.ctx.stroke();
  M.ctx.fillStyle=col; M.ctx.font='bold 10px monospace';
  M.ctx.textAlign='center'; M.ctx.textBaseline='middle';
  M.ctx.fillText(pt.number,x,y);
}

// ══ TOUCH ══
let T = { drag:false, pinch:false, sx:0, sy:0, lat0:0, lng0:0, pd0:0, sc0:1, pr0:0, mr0:0, lastTap:0 };

function initTouch() {
  const c=M.canvas;
  c.addEventListener('touchstart',  onTS, {passive:false});
  c.addEventListener('touchmove',   onTM, {passive:false});
  c.addEventListener('touchend',    onTE, {passive:false});
}

function onTS(e) {
  e.preventDefault();
  if (e.touches.length===1) {
    T.drag=true; T.pinch=false;
    T.sx=e.touches[0].clientX; T.sy=e.touches[0].clientY;
    T.lat0=M.lat; T.lng0=M.lng;
  }
  if (e.touches.length===2) {
    T.drag=false; T.pinch=true;
    const t0=e.touches[0],t1=e.touches[1];
    T.pd0=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    T.sc0=M.scale;
    T.pr0=Math.atan2(t1.clientY-t0.clientY,t1.clientX-t0.clientX);
    T.mr0=M.rot;
  }
}

function onTM(e) {
  e.preventDefault();
  if (T.drag && e.touches.length===1) {
    const dx=e.touches[0].clientX-T.sx, dy=e.touches[0].clientY-T.sy;
    const cos=Math.cos(M.lat*Math.PI/180);
    // Apply inverse rotation to pan correctly
    const c=Math.cos(-M.rot), s=Math.sin(-M.rot);
    const rdx=dx*c-dy*s, rdy=dx*s+dy*c;
    M.lat = T.lat0 + rdy/M.scale;
    M.lng = T.lng0 - rdx/(M.scale*cos);
  }
  if (T.pinch && e.touches.length===2) {
    const t0=e.touches[0],t1=e.touches[1];
    const dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    M.scale=Math.min(Math.max(T.sc0*dist/T.pd0,300),500000);
    // Rotation: positive angle clockwise on screen = positive rotation
    const angle=Math.atan2(t1.clientY-t0.clientY,t1.clientX-t0.clientX);
    M.rot = T.mr0 + (angle - T.pr0);
    document.getElementById('rot-btn').style.display = Math.abs(M.rot)>0.05 ? 'flex':'none';
  }
}

function onTE(e) {
  e.preventDefault();
  // Tap detection for marker info
  if (e.changedTouches.length===1 && !T.pinch) {
    const now=Date.now();
    const dx=e.changedTouches[0].clientX-T.sx, dy=e.changedTouches[0].clientY-T.sy;
    if (Math.hypot(dx,dy)<10 && now-T.lastTap>300) {
      handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }
    T.lastTap=now;
  }
  T.drag=false; T.pinch=false;
}

function handleTap(sx, sy) {
  // Check if tap is on a marker
  for (const pt of ST.points) {
    const {x,y}=proj(pt.lat,pt.lng);
    if (Math.hypot(sx-x,sy-y) < 22) {
      ST.curPt=pt; ST.isEdit=true;
      openSheet(pt);
      return;
    }
  }
}

function resetRot() { M.rot=0; document.getElementById('rot-btn').style.display='none'; }

// ══ AUTO TRAMO DETECTION ══
function nearestTramo(lat,lng) {
  let best=null, bestDist=Infinity;
  ST.tramos.forEach(t=>{
    // Check distance to each point in the simplified route
    for (let i=0;i<t.route.length;i++) {
      const d=Math.hypot(lat-t.route[i][0], lng-t.route[i][1]);
      if (d<bestDist) { bestDist=d; best=t; }
    }
  });
  return best;
}

// ══ DISTANCE ON ROUTE ══
function distanceOnRoute(tramo, lat, lng) {
  // Haversine between two points in km
  function hav(a, b) {
    const R=6371, dLat=(b[0]-a[0])*Math.PI/180, dLng=(b[1]-a[1])*Math.PI/180;
    const x=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLng/2)**2;
    return R*2*Math.asin(Math.sqrt(x));
  }
  if (!tramo || !tramo.route || tramo.route.length < 2) return null;

  // Find nearest point on route
  let nearIdx=0, nearDist=Infinity;
  tramo.route.forEach((p,i)=>{
    const d=Math.hypot(lat-p[0], lng-p[1]);
    if(d<nearDist){nearDist=d;nearIdx=i;}
  });

  // Accumulate distance from start to nearIdx
  let fromStart=0;
  for(let i=0;i<nearIdx;i++) fromStart+=hav(tramo.route[i],tramo.route[i+1]);

  // Total route length
  let total=0;
  for(let i=0;i<tramo.route.length-1;i++) total+=hav(tramo.route[i],tramo.route[i+1]);

  return { fromStart: Math.round(fromStart*10)/10, toEnd: Math.round((total-fromStart)*10)/10, total: Math.round(total*10)/10 };
}

// ══ MARK POINT ══
function markPoint() {
  const center = unproj(M.W/2, M.H/2);
  const tramo  = nearestTramo(center.lat, center.lng);
  const dist = tramo ? distanceOnRoute(tramo, center.lat, center.lng) : null;
  const pt = {
    id: Date.now().toString(), number:ST.nextN++,
    lat:center.lat, lng:center.lng,
    tramo: tramo ? tramo.name : '',
    distFromStart: dist ? dist.fromStart : null,
    distToEnd:     dist ? dist.toEnd     : null,
    type:null, photo:null, audio:null, audioDur:0,
    notes:'', ts:new Date().toISOString(),
  };
  ST.points.push(pt); ST.curPt=pt; ST.isEdit=false;
  persist(); openSheet(pt);
  toast('#'+pt.number+' marcado');
}

function onPhoto(e) {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    const original=ev.target.result;
    // Compress to 20% of original dimensions before storing
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      canvas.width  = Math.round(img.naturalWidth  * 0.2);
      canvas.height = Math.round(img.naturalHeight * 0.2);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const compressed = canvas.toDataURL('image/jpeg', 0.75);
      document.getElementById('photo-prev').src=compressed;
      document.getElementById('photo-preview-wrap').style.display='block';
      document.getElementById('photo-opts-row').style.display='none';
      if(ST.curPt) ST.curPt._photo=compressed;
    };
    img.src=original;
  };
  r.readAsDataURL(f); e.target.value='';
}

async function clearPhoto() {
  document.getElementById('photo-prev').src='';
  document.getElementById('photo-preview-wrap').style.display='none';
  document.getElementById('photo-opts-row').style.display='grid';
  if(ST.curPt){
    ST.curPt._photo=null;
    if(ST.curPt.photo){ 
      await deletePhoto('photo_'+ST.curPt.id);
      ST.curPt.photo=null;
      persist();
    }
  }
}

async function savePoint() {
  if(!ST.curPt) return;
  const pt=ST.curPt;
  pt.type=shType;
  pt.notes=document.getElementById('notes-ta').value.trim();
  if(pt._photo){ pt.photo=pt._photo; delete pt._photo; }
  if(REC.pendingB64){ pt.audio=REC.pendingB64; pt.audioDur=REC.elapsed; }
  try {
    await persistPhoto(pt);
  } catch(e) {
    console.warn('persistPhoto error:', e);
  }
  persist();
  closeSheet();
  toast('Punto guardado');
}

async function delPoint() {
  if(!ST.curPt) return;
  if(!confirm('¿Eliminar punto #'+ST.curPt.number+'? Esta acción no se puede deshacer.')) return;
  await deletePhoto('photo_'+ST.curPt.id);

  ST.points=ST.points.filter(p=>p.id!==ST.curPt.id);
  persist(); closeSheet(); toast('Punto eliminado');
}

const REC={recorder:null,chunks:[],isRec:false,iv:null,elapsed:0,pendingB64:null};
function resetAudio(){
  if(REC.isRec)stopRec();
  clearInterval(REC.iv);REC.isRec=false;REC.elapsed=0;REC.pendingB64=null;REC.chunks=[];
  document.getElementById('rec-dot').classList.remove('on');
  document.getElementById('rec-h').textContent='LISTO';
  document.getElementById('rec-t').textContent='0:00';
  document.getElementById('rec-btn').classList.remove('stop');
  document.getElementById('rec-mic').style.display='block';
  document.getElementById('rec-stop').style.display='none';
  document.getElementById('player-row').classList.remove('show');
}
function showPlayer(b64,dur){
  const a=document.getElementById('audio-el');
  a.src=b64;
  document.getElementById('play-d').textContent=fmt(dur||0);
  document.getElementById('player-row').classList.add('show');
  a.ontimeupdate=()=>{if(!a.duration)return;document.getElementById('play-p').style.width=(a.currentTime/a.duration*100)+'%';document.getElementById('play-d').textContent=fmt(a.currentTime);};
  a.onended=()=>{document.getElementById('play-i').style.display='block';document.getElementById('pause-i').style.display='none';document.getElementById('play-p').style.width='0%';document.getElementById('play-d').textContent=fmt(dur||0);};
}
function toggleRec(){
  if(REC.isRec){ stopRec(); return; }
  // getUserMedia must be called synchronously from user gesture on iOS Safari
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    toast('Tu browser no soporta grabación de audio');
    return;
  }
  navigator.mediaDevices.getUserMedia({audio:true})
    .then(function(stream){
      // Detect best supported mime type
      const mimes=['audio/mp4','audio/webm;codecs=opus','audio/webm','audio/ogg'];
      const mime = mimes.find(m=>{ try{return MediaRecorder.isTypeSupported(m);}catch(e){return false;} }) || '';
      const opts = mime ? {mimeType:mime} : {};
      REC.recorder = new MediaRecorder(stream, opts);
      REC.chunks=[]; REC.elapsed=0;
      REC.recorder.ondataavailable = function(e){ if(e.data && e.data.size>0) REC.chunks.push(e.data); };
      REC.recorder.onstop = function(){
        stream.getTracks().forEach(function(t){ t.stop(); });
        const finalMime = mime || 'audio/webm';
        const blob = new Blob(REC.chunks, {type:finalMime});
        const fr = new FileReader();
        fr.onload = function(ev){
          REC.pendingB64 = ev.target.result;
          showPlayer(ev.target.result, REC.elapsed);
        };
        fr.readAsDataURL(blob);
        document.getElementById('rec-h').textContent='LISTA';
      };
      REC.recorder.start(200);
      REC.isRec = true;
      document.getElementById('rec-dot').classList.add('on');
      document.getElementById('rec-h').textContent = 'GRABANDO';
      document.getElementById('rec-btn').classList.add('stop');
      document.getElementById('rec-mic').style.display = 'none';
      document.getElementById('rec-stop').style.display = 'block';
      REC.iv = setInterval(function(){
        REC.elapsed++;
        document.getElementById('rec-t').textContent = fmt(REC.elapsed);
        if(REC.elapsed >= 120) stopRec();
      }, 1000);
    })
    .catch(function(err){
      console.error('getUserMedia error:', err.name, err.message);
      if(err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError'){
        toast('Permiso de micrófono denegado — habilitalo en Ajustes');
      } else if(err.name === 'NotFoundError'){
        toast('No se encontró micrófono en el dispositivo');
      } else {
        toast('No se pudo acceder al micrófono: ' + err.name);
      }
    });
}
function stopRec(){
  clearInterval(REC.iv);REC.isRec=false;
  if(REC.recorder&&REC.recorder.state!=='inactive')REC.recorder.stop();
  document.getElementById('rec-dot').classList.remove('on');
  document.getElementById('rec-btn').classList.remove('stop');
  document.getElementById('rec-mic').style.display='block';
  document.getElementById('rec-stop').style.display='none';
}
function togglePlay(){
  const a=document.getElementById('audio-el');
  if(a.paused){a.play();document.getElementById('play-i').style.display='none';document.getElementById('pause-i').style.display='block';}
  else{a.pause();document.getElementById('play-i').style.display='block';document.getElementById('pause-i').style.display='none';}
}
function delAudio(){
  if(ST.curPt){ST.curPt.audio=null;ST.curPt.audioDur=0;}REC.pendingB64=null;
  document.getElementById('audio-el').pause();document.getElementById('audio-el').src='';
  document.getElementById('player-row').classList.remove('show');resetAudio();toast('Nota de voz borrada');
}

function renderTramoImage(tramo, pts, W, H) {
  // Render tramo to offscreen canvas and return dataURL
  const oc = document.createElement('canvas');
  oc.width = W; oc.height = H;
  const ctx = oc.getContext('2d');

  // Background
  ctx.fillStyle = '#0d1520';
  ctx.fillRect(0, 0, W, H);

  if (tramo.route.length < 2) return oc.toDataURL('image/jpeg', 0.92);

  // Calculate bounds with padding
  const pad = 0.12;
  const lats = tramo.route.map(p=>p[0]), lngs = tramo.route.map(p=>p[1]);
  const minLat=Math.min(...lats), maxLat=Math.max(...lats);
  const minLng=Math.min(...lngs), maxLng=Math.max(...lngs);
  const dLat=(maxLat-minLat)||0.01, dLng=(maxLng-minLng)||0.01;
  const cLat=(minLat+maxLat)/2,    cLng=(minLng+maxLng)/2;
  const cos=Math.cos(cLat*Math.PI/180);
  const scale=Math.min((H*(1-pad*2))/dLat, (W*(1-pad*2))/(dLng*cos));

  function toXY(lat,lng) {
    return {
      x: W/2 + (lng-cLng)*scale*cos,
      y: H/2 - (lat-cLat)*scale
    };
  }

  // Draw subtle grid
  ctx.strokeStyle = '#1a2535';
  ctx.lineWidth = 1;
  const gridStep = Math.pow(10, Math.floor(Math.log10(dLat))) / 2;
  for (let lat=Math.ceil(minLat/gridStep)*gridStep; lat<=maxLat; lat+=gridStep) {
    const {y} = toXY(lat, cLng);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  for (let lng=Math.ceil(minLng/gridStep)*gridStep; lng<=maxLng; lng+=gridStep) {
    const {x} = toXY(cLat, lng);
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }

  // Draw route shadow for depth
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const p0s = toXY(tramo.route[0][0], tramo.route[0][1]);
  ctx.moveTo(p0s.x+2, p0s.y+2);
  for (let i=1; i<tramo.route.length; i++) {
    const p=toXY(tramo.route[i][0],tramo.route[i][1]);
    ctx.lineTo(p.x+2,p.y+2);
  }
  ctx.stroke();

  // Draw route
  ctx.beginPath();
  ctx.strokeStyle = tramo.color;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const p0=toXY(tramo.route[0][0],tramo.route[0][1]);
  ctx.moveTo(p0.x,p0.y);
  for (let i=1; i<tramo.route.length; i++) {
    const p=toXY(tramo.route[i][0],tramo.route[i][1]);
    ctx.lineTo(p.x,p.y);
  }
  ctx.stroke();

  // Start / End markers
  function drawEndpoint(lat, lng, label, color) {
    const {x,y} = toXY(lat,lng);
    ctx.beginPath(); ctx.arc(x,y,12,0,Math.PI*2);
    ctx.fillStyle=color+'33'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,12,0,Math.PI*2);
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle=color; ctx.font='bold 10px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(label,x,y);
  }
  if (tramo.start) drawEndpoint(tramo.start.lat, tramo.start.lng, 'S', '#00ff88');
  if (tramo.end)   drawEndpoint(tramo.end.lat,   tramo.end.lng,   'F', '#ff4466');

  // Draw user points
  pts.forEach(pt => {
    const {x,y} = toXY(pt.lat,pt.lng);
    const col = pt.type==='photo'?'#00e5ff':pt.type==='video'?'#0080ff':pt.type==='both'?'#00ffaa':'#aabbcc';
    const r = 14;
    // Shadow
    ctx.beginPath(); ctx.arc(x+1,y+1,r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fill();
    // Circle
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=col+'22'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.stroke();
    // Number
    ctx.fillStyle='#ffffff'; ctx.font='bold 11px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(pt.number,x,y);
  });

  // Legend: point numbers with type
  if (pts.length > 0) {
    const legX=14, legY=14;
    const lineH=18, legW=160;
    const legH=pts.length*lineH+20;
    ctx.fillStyle='rgba(0,0,0,0.75)';
    ctx.beginPath();
    ctx.roundRect(legX,legY,legW,legH,6);
    ctx.fill();
    pts.forEach((pt,i) => {
      const col=pt.type==='photo'?'#00e5ff':pt.type==='video'?'#0080ff':pt.type==='both'?'#00ffaa':'#778899';
      const ty=legY+14+i*lineH;
      ctx.beginPath(); ctx.arc(legX+12,ty,6,0,Math.PI*2);
      ctx.fillStyle=col+'33'; ctx.fill();
      ctx.beginPath(); ctx.arc(legX+12,ty,6,0,Math.PI*2);
      ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font='bold 9px monospace';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(pt.number,legX+12,ty);
      const label=pt.type==='photo'?'Foto':pt.type==='video'?'Video':pt.type==='both'?'Foto+Video':'—';
      ctx.fillStyle='#aac0d0'; ctx.font='11px sans-serif';
      ctx.textAlign='left'; ctx.textBaseline='middle';
      const note=(pt.notes||'').substring(0,18)+(pt.notes&&pt.notes.length>18?'…':'');
      ctx.fillText('#'+pt.number+' '+label+(note?' · '+note:''), legX+24, ty);
    });
  }

  // Compass
  const cx=W-28, cy=H-28;
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.beginPath(); ctx.arc(cx,cy,18,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff4444'; ctx.font='bold 11px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('N',cx,cy-6);
  ctx.fillStyle='#888'; ctx.fillText('S',cx,cy+6);

  return oc.toDataURL('image/jpeg', 0.92);
}

function genKMZ(){
  if(!ST.points.length){toast('Sin puntos para exportar');return;}

  const typeIcon = {
    photo:  'http://maps.google.com/mapfiles/kml/paddle/blu-circle.png',
    video:  'http://maps.google.com/mapfiles/kml/paddle/red-circle.png',
    both:   'http://maps.google.com/mapfiles/kml/paddle/ylw-stars.png',
    null:   'http://maps.google.com/mapfiles/kml/paddle/wht-circle.png',
  };

  // Build KML string
  let kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
  <name>Huella de Tapir — ${ST.kmzName}</name>
  <description>Recce exportado el ${new Date().toLocaleDateString('es-AR')}</description>

  <Style id="photo"><IconStyle><Icon><href>${typeIcon.photo}</href></Icon></IconStyle></Style>
  <Style id="video"><IconStyle><Icon><href>${typeIcon.video}</href></Icon></IconStyle></Style>
  <Style id="both"><IconStyle><Icon><href>${typeIcon.both}</href></Icon></IconStyle></Style>
  <Style id="none"><IconStyle><Icon><href>${typeIcon.null}</href></Icon></IconStyle></Style>
`;

  // One folder per tramo
  const groups={};
  ST.points.forEach(pt=>{const k=pt.tramo||'Sin tramo';if(!groups[k])groups[k]=[];groups[k].push(pt);});
  const orderedKeys=[...ST.tramos.map(t=>t.name).filter(n=>groups[n]),...Object.keys(groups).filter(k=>!ST.tramos.find(t=>t.name===k))];

  orderedKeys.forEach(key=>{
    const pts=groups[key];
    const tramo=ST.tramos.find(t=>t.name===key);
    kml+=`  <Folder><name>${escXML(key)}</name>
`;

    // Include original route as LineString
    if(tramo && tramo.route && tramo.route.length>1){
      const coords=tramo.route.map(p=>`${p[1].toFixed(6)},${p[0].toFixed(6)},0`).join(' ');
      kml+=`    <Placemark>
      <name>${escXML(key)} — Ruta</name>
      <Style><LineStyle><color>ff00e5ff</color><width>3</width></LineStyle></Style>
      <LineString><tessellate>1</tessellate><coordinates>${coords}</coordinates></LineString>
    </Placemark>
`;
    }

    // Each user point
    pts.forEach(pt=>{
      const styleId=pt.type||'none';
      const tl=pt.type==='photo'?'Foto':pt.type==='video'?'Video':pt.type==='both'?'Foto+Video':'Sin tipo';
      const distDesc=(pt.distFromStart!==null&&pt.distFromStart!==undefined)
        ? `${pt.distFromStart}km desde largada · ${pt.distToEnd}km hasta llegada` : '';
      const desc=[tl, distDesc, pt.notes].filter(Boolean).join(' | ');
      kml+=`    <Placemark>
      <name>#${pt.number} — ${tl}</name>
      <description>${escXML(desc)}</description>
      <styleUrl>#${styleId}</styleUrl>
      <ExtendedData>
        <Data name="tipo"><value>${tl}</value></Data>
        <Data name="tramo"><value>${escXML(key)}</value></Data>
        ${pt.distFromStart!==null&&pt.distFromStart!==undefined?`<Data name="dist_largada_km"><value>${pt.distFromStart}</value></Data>
        <Data name="dist_llegada_km"><value>${pt.distToEnd}</value></Data>`:''}
        ${pt.notes?`<Data name="notas"><value>${escXML(pt.notes)}</value></Data>`:''}
        <Data name="timestamp"><value>${pt.ts}</value></Data>
      </ExtendedData>
      <Point><coordinates>${pt.lng.toFixed(6)},${pt.lat.toFixed(6)},0</coordinates></Point>
    </Placemark>
`;
    });

    kml+=`  </Folder>
`;
  });

  kml+=`</Document>
</kml>`;

  // Build ZIP (KMZ) in pure JS
  const kmlBytes = new TextEncoder().encode(kml);
  const kmzBytes = buildZip([{ name:'doc.kml', data:kmlBytes }]);
  const blob = new Blob([kmzBytes], {type:'application/vnd.google-earth.kmz'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=`HuellaDeTapir_${ST.kmzName.replace(/\.kmz?$/i,'')}_recce.kmz`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('KMZ exportado ✓');
}

function escXML(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildZip(files){
  // Build a minimal ZIP (store, no compression) - works for KMZ
  const parts=[];
  const centralDir=[];
  let offset=0;

  files.forEach(({name,data})=>{
    const nameBytes=new TextEncoder().encode(name);
    const now=new Date();
    const dosDate=((now.getFullYear()-1980)<<9)|((now.getMonth()+1)<<5)|now.getDate();
    const dosTime=(now.getHours()<<11)|(now.getMinutes()<<5)|(now.getSeconds()>>1);

    // CRC32
    const crc=crc32(data);

    // Local file header
    const lh=new DataView(new ArrayBuffer(30+nameBytes.length));
    lh.setUint32(0,0x04034b50,true);  // signature
    lh.setUint16(4,20,true);           // version needed
    lh.setUint16(6,0,true);            // flags
    lh.setUint16(8,0,true);            // compression (store)
    lh.setUint16(10,dosTime,true);
    lh.setUint16(12,dosDate,true);
    lh.setUint32(14,crc,true);
    lh.setUint32(18,data.length,true); // compressed size
    lh.setUint32(22,data.length,true); // uncompressed size
    lh.setUint16(26,nameBytes.length,true);
    lh.setUint16(28,0,true);           // extra length
    new Uint8Array(lh.buffer,30).set(nameBytes);

    // Central directory entry
    const cd=new DataView(new ArrayBuffer(46+nameBytes.length));
    cd.setUint32(0,0x02014b50,true);
    cd.setUint16(4,20,true); cd.setUint16(6,20,true);
    cd.setUint16(8,0,true); cd.setUint16(10,0,true);
    cd.setUint16(12,dosTime,true); cd.setUint16(14,dosDate,true);
    cd.setUint32(16,crc,true);
    cd.setUint32(20,data.length,true); cd.setUint32(24,data.length,true);
    cd.setUint16(28,nameBytes.length,true);
    cd.setUint16(30,0,true); cd.setUint16(32,0,true);
    cd.setUint16(34,0,true); cd.setUint32(38,0,true);
    cd.setUint32(42,offset,true);
    new Uint8Array(cd.buffer,46).set(nameBytes);

    parts.push(new Uint8Array(lh.buffer), data);
    centralDir.push(new Uint8Array(cd.buffer));
    offset+=30+nameBytes.length+data.length;
  });

  // End of central directory
  const cdSize=centralDir.reduce((s,b)=>s+b.length,0);
  const eocd=new DataView(new ArrayBuffer(22));
  eocd.setUint32(0,0x06054b50,true);
  eocd.setUint16(4,0,true); eocd.setUint16(6,0,true);
  eocd.setUint16(8,files.length,true); eocd.setUint16(10,files.length,true);
  eocd.setUint32(12,cdSize,true); eocd.setUint32(16,offset,true);
  eocd.setUint16(20,0,true);

  const all=[...parts,...centralDir,new Uint8Array(eocd.buffer)];
  const total=all.reduce((s,b)=>s+b.length,0);
  const out=new Uint8Array(total); let pos=0;
  all.forEach(b=>{out.set(b,pos);pos+=b.length;});
  return out;
}

function crc32(buf){
  let c=0xFFFFFFFF;
  if(!crc32.table){
    crc32.table=new Uint32Array(256);
    for(let i=0;i<256;i++){let v=i;for(let j=0;j<8;j++)v=v&1?(0xEDB88320^(v>>>1)):(v>>>1);crc32.table[i]=v;}
  }
  for(let i=0;i<buf.length;i++) c=crc32.table[(c^buf[i])&0xFF]^(c>>>8);
  return (c^0xFFFFFFFF)>>>0;
}
