<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rally Sudamericano 2026 - Media Recce</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<style>
:root{--teal:#00c9a7;--teal-dim:#00c9a718;--teal-b:#00c9a728;--navy:#0d1b2e;--navy2:#112236;--navy3:#162d40;--muted:#4a6a8a;--eta:#1a7fd4;--eta-dim:#1a7fd418;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100dvh;overflow:hidden;background:var(--navy);color:#fff;font-family:'Barlow',sans-serif;}
header{position:absolute;top:0;left:0;right:0;z-index:800;height:54px;background:var(--navy);border-bottom:1px solid var(--teal-b);display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.hl{display:flex;align-items:center;gap:10px;}
.htitle-wrap{display:flex;flex-direction:column;justify-content:center;}
.htitle-wrap{display:inline-flex;flex-direction:column;}
.ht{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;line-height:1;width:fit-content;}
.hsub{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:400;text-transform:uppercase;color:var(--muted);margin-top:2px;display:flex;justify-content:space-between;letter-spacing:.02em;}
.hb{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);background:var(--teal);padding:0 8px;border-radius:2px;align-self:stretch;display:flex;align-items:center;gap:0;}
.hc{font-size:11px;color:var(--muted);}
.hr{display:flex;gap:5px;}
.fb{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 11px;border-radius:2px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all .12s;}
.fb.on{border-color:var(--teal);color:var(--teal);background:var(--teal-dim);}
.fb.one{border-color:var(--eta);color:var(--eta);background:var(--eta-dim);}
#map{position:absolute;inset:54px 0 72px 0;z-index:1;}
.panel{position:absolute;top:68px;right:14px;z-index:700;width:185px;background:rgba(13,27,46,.95);border:1px solid var(--teal-b);border-radius:2px;overflow:hidden;}
.ph{background:#00c9a712;border-bottom:1px solid var(--teal-b);padding:7px 10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.ph-arrow{font-size:8px;color:var(--teal);transition:transform .2s;}
.ph-arrow.collapsed{transform:rotate(-90deg);}
.panel-body{overflow:hidden;transition:max-height .25s ease;}
.panel-body.collapsed{max-height:0!important;}
.pr{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid #ffffff08;cursor:pointer;transition:background .1s;}
.pr:hover{background:#ffffff08;}
.pr.active{background:#ffffff0a;border-left:2px solid #00e5ff;}
.pr-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#cdd8e8;}
.pr-name.active{color:#00e5ff;}
.pr-sub{font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;margin-top:1px;}
.pr-dot{width:6px;height:6px;border-radius:50%;background:#ffffff18;flex-shrink:0;}
.pr-dot.active{background:#00e5ff;box-shadow:0 0 6px #00e5ff;}
.leg{position:absolute;bottom:86px;left:14px;z-index:700;background:rgba(13,27,46,.92);border:1px solid var(--teal-b);padding:7px 12px;border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);line-height:2.1;}
.ll{display:inline-block;width:20px;height:3px;border-radius:2px;margin-right:7px;vertical-align:middle;}
.lc{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle;}
.ls{display:inline-block;width:7px;height:7px;border-radius:1px;margin-right:7px;vertical-align:middle;}
.mk-loc{width:14px;height:14px;border-radius:50%;background:var(--teal);border:2px solid var(--navy);box-shadow:0 0 0 1.5px var(--teal),0 0 8px #00c9a780;cursor:pointer;}
.mk-eta{width:11px;height:11px;border-radius:2px;background:var(--eta);border:2px solid var(--navy);cursor:pointer;}
.leaflet-popup-content-wrapper{background:var(--navy2)!important;color:#fff!important;border:1px solid #ffffff18!important;border-radius:3px!important;box-shadow:0 12px 40px rgba(0,0,0,.8)!important;padding:0!important;}
.leaflet-popup-tip-container{display:none!important;}
.leaflet-popup-content{margin:0!important;}
.leaflet-popup-close-button{color:var(--muted)!important;top:10px!important;right:10px!important;}
.pop{padding:13px 15px;min-width:190px;}
.ptag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:3px;}
.ptag.e{color:var(--eta);}
.pname{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;line-height:1.2;margin-bottom:5px;}
.pcoords{font-size:10px;color:var(--muted);margin-bottom:10px;font-family:monospace;}
.pbtn{display:block;width:100%;padding:8px 0;background:var(--teal);color:var(--navy);border:none;border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;}
.pbtn.e{background:var(--eta);color:#fff;}
/* FOOTER */
footer{position:absolute;bottom:0;left:0;right:0;z-index:800;height:72px;background:#fff;border-top:1px solid #e0e0e0;display:flex;align-items:center;padding:0 16px;}
footer img{height:48px;width:auto;object-fit:contain;display:block;}
/* VISOR */
#vo{display:none;position:fixed;inset:0;z-index:2000;background:var(--navy);flex-direction:column;}
#vo.on{display:flex;}
#vh{height:54px;flex-shrink:0;background:var(--navy);border-bottom:1px solid var(--teal-b);display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
#vl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:1px;}
#vt{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;}
#xb{background:var(--navy3);border:1px solid var(--teal-b);color:var(--muted);width:30px;height:30px;border-radius:2px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#xb:hover{border-color:var(--teal);color:#fff;}
#pc{flex:1;width:100%;position:relative;}
#np{display:none;flex:1;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#np p{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:center;line-height:2;}
#np code{color:var(--teal);background:var(--teal-dim);padding:1px 7px;border-radius:2px;font-size:11px;font-family:monospace;text-transform:lowercase;}
.leaflet-control-zoom{border:1px solid var(--teal-b)!important;border-radius:2px!important;overflow:hidden;box-shadow:none!important;}
.leaflet-control-zoom a{background:var(--navy2)!important;color:var(--teal)!important;border-bottom:1px solid var(--teal-b)!important;width:28px!important;height:28px!important;line-height:28px!important;}
.leaflet-tooltip{background:transparent!important;border:none!important;box-shadow:none!important;padding:0!important;}
.led{display:inline-block;width:6px;height:6px;border-radius:50%;background:#fff;box-shadow:0 0 4px #fff,0 0 8px #fff;margin-left:7px;flex-shrink:0;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.15;}}
/* FLAG markers */
.flag-start,.flag-finish{cursor:default;}
</style>

<script>
(function(){
  function syncSub(){
    var ht = document.querySelector('.ht');
    var sub = document.getElementById('hsub');
    if(ht && sub){ sub.style.width = ht.offsetWidth + 'px'; }
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', syncSub);
  } else { syncSub(); }
  window.addEventListener('resize', syncSub);
})();
</script>
</head>
<body>
<header>
  <div class="hl">
    <div class="htitle-wrap">
      <div class="ht">Rally Sudamericano</div>
      <div class="hsub" id="hsub"><span>Mina Clavero</span><span>&middot;</span><span>Cordoba</span><span>&middot;</span><span>Argentina</span></div>
    </div>
    <div class="hb">Media Recce<span class="led"></span></div>
    <span class="hc" id="hc"></span>
  </div>
  <div class="hr">
    <button class="fb on"  id="fa" onclick="sf('all')">Todos</button>
    <button class="fb one" id="fe" onclick="sf('etapa')">Etapas</button>
    <button class="fb on"  id="fl" onclick="sf('locacion')">360</button>
  </div>
</header>
<div id="map"></div>
<div class="panel" id="panel"><div class="ph">Tramos de etapa</div></div>
<div class="leg">
  <div><span class="ll" style="background:#fff;box-shadow:0 0 8px #fff,0 0 18px #aad4ff60;"></span>Tramo activo</div>
  <div><span class="ll" style="background:#fff;opacity:.25;"></span>Tramo</div>
  <div><span class="ll" style="background:#3a5a7a;opacity:.6;"></span>Enlace</div>
  <div><span class="lc" style="background:var(--teal);box-shadow:0 0 6px var(--teal);"></span>Locacion 360</div>
  <div><span class="ls" style="background:var(--eta);"></span>Inicio / Final</div>
</div>

var SMETA  = {
  "Tala Canada- Rio Jaime":      {label:"SS 1 / SS 4",   sub:"Tala Canada - Rio Jaime"},
  "El Cruce- Ambul":             {label:"SS 2 / SS 5",   sub:"El Cruce - Ambul"},
  "El Mirador- Cuesta San Luis": {label:"SS 3 / SS 6",   sub:"El Mirador - C. San Luis"},
  "Nido del Aguila-Aerodromo":   {label:"SS 7",          sub:"Nido del Aguila - Aerodromo"},
  "El Faro- San Jose":           {label:"SS 8 / SS 11",  sub:"El Faro - San Jose"},
  "PE 8-11":                     {label:"SS 9 / SS 12",  sub:"Cienaga de Allende - Mina C."},
  "Giulio Cesare- Mina Clavwro": {label:"SS 10 / SS 13", sub:"Giulio Cesare - Mina Clavero (Power Stage)"},
  "Shakedown":                   {label:"Shakedown",     sub:""}
};

var map = L.map("map",{zoomControl:true,attributionControl:false});
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",{maxZoom:19}).addTo(map);
var las=POINTS.map(function(p){return p.lat;}), los=POINTS.map(function(p){return p.lon;});
map.fitBounds([[Math.min.apply(null,las)-0.05,Math.min.apply(null,los)-0.05],[Math.max.apply(null,las)+0.05,Math.max.apply(null,los)+0.05]]);

var mkrs=[], rLayers=[], af="all", aStage=null, viewer=null;

function drawRoutes(hl){
  for(var i=0;i<rLayers.length;i++) map.removeLayer(rLayers[i]);
  rLayers=[];
  for(var i=0;i<LINES.length;i++){
    var ln=LINES[i], cc=ln.coords;
    if(!ln.stage){
      rLayers.push(L.polyline(cc,{color:"#3a5a7a",weight:1.5,opacity:0.45,dashArray:"6 5"}).addTo(map));
      continue;
    }
    if(ln.name==="Shakedown"){
      rLayers.push(L.polyline(cc,{color:"#fff",weight:1.5,opacity:0.2,dashArray:"5 4"}).addTo(map));
      continue;
    }
    var h=hl&&ln.name===hl;
    var lg=L.polyline(cc,{color:h?"#00e5ff":"#fff",weight:10,opacity:h?0.5:0.10}).addTo(map);
    var lm=L.polyline(cc,{color:h?"#7ff8ff":"#cce8ff",weight:4.5,opacity:h?0.9:0.30}).addTo(map);
    var lc=L.polyline(cc,{color:h?"#00e5ff":"#fff",weight:2,opacity:h?1:0.45}).addTo(map);
    var meta=SMETA[ln.name];
    if(meta){
      var tip='<span style="font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:#0b1120cc;border:1px solid #ffffff30;padding:3px 8px;border-radius:2px;">'+meta.label+'</span>';
      lc.bindTooltip(tip,{sticky:true,direction:"top",className:"leaflet-tooltip"});
    }
    (function(name){
      lg.on("click",function(){clickStage(name);});
      lm.on("click",function(){clickStage(name);});
      lc.on("click",function(){clickStage(name);});
    })(ln.name);
    rLayers.push(lg,lm,lc);
  }
}

function buildPanel(aName){
  var ORDER=["Tala Canada- Rio Jaime","El Cruce- Ambul","El Mirador- Cuesta San Luis","Nido del Aguila-Aerodromo","El Faro- San Jose","PE 8-11","Giulio Cesare- Mina Clavwro"];
  var panel=document.getElementById("panel");
  var collapsed=panel.dataset.collapsed==='1';
  var html='<div class="ph" onclick="togglePanel()">Tramos de etapa<span class="ph-arrow'+(collapsed?' collapsed':'')+'">&#9660;</span></div>'
    +'<div class="panel-body'+(collapsed?' collapsed':'')+'" id="panel-body" style="max-height:500px;">';
  for(var i=0;i<ORDER.length;i++){
    var name=ORDER[i];
    var m=SMETA[name];
    if(!m) continue;
    var a=name===aName;
    html+='<div class="pr'+(a?' active':'')+'" onclick="clickStage(this.dataset.n)" data-n="'+name+'">'
      +'<div><div class="pr-name'+(a?' active':'')+'">'+m.label+'</div>'
      +(m.sub?'<div class="pr-sub">'+m.sub+'</div>':'')
      +'</div><div class="pr-dot'+(a?' active':'')+'"></div></div>';
  }
  var sda=aName==="Shakedown";
  html+='<div class="pr'+(sda?' active':'')+'" onclick="clickStage(this.dataset.n)" data-n="Shakedown">'
    +'<div><div class="pr-name'+(sda?' active':'')+'" style="color:'+(sda?'#fff':'var(--muted)')+'">Shakedown</div></div>'
    +'<div class="pr-dot'+(sda?' active':'')+'"></div></div>';
  html+='</div>';
  panel.innerHTML=html;
}


function togglePanel(){
  var panel=document.getElementById("panel");
  panel.dataset.collapsed = panel.dataset.collapsed==='1' ? '0' : '1';
  buildPanel(window._aStage||null);
}
function clickStage(name){
  aStage=(aStage===name)?null:name;
  window._aStage=aStage;
  buildPanel(aStage); drawRoutes(aStage);
}

function icon(t){
  return L.divIcon({className:t==="locacion"?"mk-loc":"mk-eta",iconSize:t==="locacion"?[14,14]:[11,11],iconAnchor:t==="locacion"?[7,7]:[5,5]});
}

function renderMarkers(){
  for(var i=0;i<mkrs.length;i++) map.removeLayer(mkrs[i]);
  mkrs=[];
  var vis=POINTS.filter(function(p){return af==="all"||p.type===af;});
  document.getElementById("hc").textContent=vis.filter(function(p){return p.type==="locacion";}).length+" loc / "+vis.filter(function(p){return p.type==="etapa";}).length+" etapas";
  for(var i=0;i<vis.length;i++){
    var pt=vis[i], loc=pt.type==="locacion";
    var m=L.marker([pt.lat,pt.lon],{icon:icon(pt.type)}).addTo(map);
    var kmStr = pt.km !== null && pt.km !== undefined ? pt.km.toFixed(1)+' km' : '-';
    var ph='<div class="pop"><div class="ptag'+(loc?'':' e')+'">'+(loc?'Locacion 360':'Etapa')+'</div>'
      +'<div class="pname">'+pt.name+'</div>'
      +'<div class="pcoords">'+pt.lat.toFixed(5)+', '+pt.lon.toFixed(5)+'</div>'
      +'<button class="pbtn'+(loc?'':' e')+'" onclick="openV(&#39;'+pt.file+'&#39;,&#39;'+pt.name+'&#39;,&#39;'+pt.type+'&#39;)">'+(loc?'Ver 360':'Ubicacion')+'</button>'
      +'<div style="border-top:1px solid #ffffff10;margin:0;"></div>'
      +'<div style="padding:9px 14px 11px;display:flex;flex-direction:column;gap:7px;">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;">'
      +'<span style="font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#4a6a8a;">Senal</span>'
      +'<span style="display:flex;align-items:center;gap:5px;font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#00c9a7;">'
      +'<span style="width:7px;height:7px;border-radius:50%;background:#00c9a7;box-shadow:0 0 5px #00c9a7;flex-shrink:0;display:inline-block;"></span>'
      +(pt.signal||'Claro y Personal')+'</span></div>'
      +'<div style="display:flex;align-items:center;justify-content:space-between;">'
      +'<span style="font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#4a6a8a;">Desde largada</span>'
      +'<span style="font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;color:#fff;">'+kmStr+'</span>'
      +'</div>'
      +'</div>'
      +'</div>';
    m.bindPopup(ph,{maxWidth:240});
    mkrs.push(m);
  }
}

function sf(f){
  af=(af===f&&f!=="all")?"all":f;
  document.getElementById("fa").className="fb"+(af==="all"?" on":"");
  document.getElementById("fe").className="fb"+(af==="all"||af==="etapa"?" one":"");
  document.getElementById("fl").className="fb"+(af==="all"||af==="locacion"?" on":"");
  renderMarkers();
}

function openV(file,name,type){
  map.closePopup();
  document.getElementById("vl").textContent=type==="locacion"?"Locacion 360":"Etapa";
  document.getElementById("vt").textContent=name.toUpperCase();
  document.getElementById("ef").textContent=file;
  var ov=document.getElementById("vo"),pc=document.getElementById("pc"),np=document.getElementById("np");
  ov.classList.add("on"); pc.style.display="block"; np.style.display="none";
  if(viewer){try{viewer.destroy();}catch(e){} viewer=null;}
  pc.innerHTML='<div id="pano" style="width:100%;height:100%;"></div>';
  var img=new Image();
  img.onload=function(){viewer=pannellum.viewer("pano",{type:"equirectangular",panorama:"fotos/"+file,autoLoad:true,autoRotate:-1.5,compass:false,showControls:true,hfov:100});};
  img.onerror=function(){pc.style.display="none";np.style.display="flex";};
  img.src="fotos/"+file;
}

function cv(){
  document.getElementById("vo").classList.remove("on");
  if(viewer){try{viewer.destroy();}catch(e){} viewer=null;}
  document.getElementById("pc").innerHTML="";
}

document.addEventListener("keydown",function(e){if(e.key==="Escape")cv();});

function makeFlag(type) {
  if (type === 'start') {
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="28" viewBox="0 0 20 28">'
      + '<line x1="2" y1="2" x2="2" y2="26" stroke="#fff" stroke-width="1.5"/>'
      + '<rect x="2" y="2" width="14" height="9" fill="#fff" opacity="0.9"/>'
      + '</svg>';
    return L.divIcon({html:svg,className:'',iconSize:[20,28],iconAnchor:[2,26]});
  } else {
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="28" viewBox="0 0 20 28">'
      + '<line x1="2" y1="2" x2="2" y2="26" stroke="#fff" stroke-width="1.5"/>'
      + '<rect x="2" y="2" width="14" height="9" fill="#fff"/>'
      + '<rect x="2" y="2" width="7" height="4.5" fill="#fff"/>'
      + '<rect x="9" y="2" width="7" height="4.5" fill="#0d1b2e"/>'
      + '<rect x="2" y="6.5" width="7" height="4.5" fill="#0d1b2e"/>'
      + '<rect x="9" y="6.5" width="7" height="4.5" fill="#fff"/>'
      + '</svg>';
    return L.divIcon({html:svg,className:'',iconSize:[20,28],iconAnchor:[2,26]});
  }
}

function addFlags() {
  var startPts = POINTS.filter(function(p){ return p.name.indexOf('Inicio')===0; });
  var endPts   = POINTS.filter(function(p){ return p.name.indexOf('Final')===0; });
  startPts.forEach(function(pt){
    L.marker([pt.lat,pt.lon],{icon:makeFlag('start'),zIndexOffset:500,interactive:false}).addTo(map);
  });
  endPts.forEach(function(pt){
    L.marker([pt.lat,pt.lon],{icon:makeFlag('finish'),zIndexOffset:500,interactive:false}).addTo(map);
  });
}
drawRoutes(null); buildPanel(null); renderMarkers(); addFlags();
</script>
