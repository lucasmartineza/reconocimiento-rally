<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<style>
:root{--teal:#00c9a7;--teal-dim:#00c9a718;--teal-b:#00c9a728;--navy:#0d1b2e;--navy2:#112236;--navy3:#162d40;--muted:#4a6a8a;--eta:#1a7fd4;--eta-dim:#1a7fd418;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100dvh;overflow:hidden;background:var(--navy);color:#fff;font-family:'Barlow',sans-serif;}
header{position:absolute;top:0;left:0;right:0;z-index:800;height:54px;background:var(--navy);border-bottom:1px solid var(--teal-b);display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.hl{display:flex;align-items:center;gap:10px;}
.htitle-wrap{display:inline-flex;flex-direction:column;}
.ht{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;line-height:1;}
.hsub{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:400;text-transform:uppercase;color:var(--muted);margin-top:2px;display:flex;gap:5px;letter-spacing:.02em;}
.hb{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);background:var(--teal);padding:0 8px;border-radius:2px;align-self:stretch;display:flex;align-items:center;}
.hc{font-size:11px;color:var(--muted);}
.hr{display:flex;gap:5px;}
.fb{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 11px;border-radius:2px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;}
.fb.on{border-color:var(--teal);color:var(--teal);background:var(--teal-dim);}
.fb.one{border-color:var(--eta);color:var(--eta);background:var(--eta-dim);}
#map{position:absolute;inset:54px 0 72px 0;z-index:1;}
.panel{position:absolute;top:68px;right:14px;z-index:700;width:185px;background:rgba(13,27,46,.95);border:1px solid var(--teal-b);border-radius:2px;overflow:hidden;}
.ph{background:#00c9a712;border-bottom:1px solid var(--teal-b);padding:7px 10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.panel-body{overflow:hidden;transition:max-height .25s ease;}
.panel-body.collapsed{max-height:0!important;}
.pr{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid #ffffff08;cursor:pointer;}
.pr:hover{background:#ffffff08;}
.pr.active{background:#ffffff0a;border-left:2px solid #00e5ff;}
.pr-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#cdd8e8;}
.pr-dot{width:6px;height:6px;border-radius:50%;background:#ffffff18;flex-shrink:0;}
.pr-dot.active{background:#00e5ff;box-shadow:0 0 6px #00e5ff;}
.leg{position:absolute;bottom:86px;left:14px;z-index:700;background:rgba(13,27,46,.92);border:1px solid var(--teal-b);padding:7px 12px;border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);line-height:2.1;}
.ll{display:inline-block;width:20px;height:3px;border-radius:2px;margin-right:7px;vertical-align:middle;}
.lc{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle;}
.ls{display:inline-block;width:7px;height:7px;border-radius:1px;margin-right:7px;vertical-align:middle;}
.mk-loc{width:14px;height:14px;border-radius:50%;background:var(--teal);border:2px solid var(--navy);box-shadow:0 0 0 1.5px var(--teal),0 0 8px #00c9a780;cursor:pointer;}
.mk-eta{width:11px;height:11px;border-radius:2px;background:var(--eta);border:2px solid var(--navy);cursor:pointer;}
.leaflet-popup-content-wrapper{background:var(--navy2)!important;color:#fff!important;border:1px solid #ffffff18!important;border-radius:3px!important;box-shadow:0 12px 40px rgba(0,0,0,.8)!important;padding:0!important;}
.leaflet-popup-tip-container{display:none!important;}
.leaflet-popup-content{margin:0!important;}
.leaflet-popup-close-button{color:var(--muted)!important;top:10px!important;right:10px!important;}
.pop{padding:13px 15px;min-width:190px;}
.ptag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:3px;}
.ptag.e{color:var(--eta);}
.pname{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;line-height:1.2;margin-bottom:5px;}
.pcoords{font-size:10px;color:var(--muted);margin-bottom:10px;font-family:monospace;}
.pbtn{display:block;width:100%;padding:8px 0;background:var(--teal);color:var(--navy);border:none;border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;}
.pbtn.e{background:var(--eta);color:#fff;}
footer{position:absolute;bottom:0;left:0;right:0;z-index:800;height:72px;background:#fff;border-top:1px solid #e0e0e0;display:flex;align-items:center;padding:0 16px;}
footer img{height:48px;width:auto;object-fit:contain;}
#vo{display:none;position:fixed;inset:0;z-index:2000;background:var(--navy);flex-direction:column;}
#vo.on{display:flex;}
#vh{height:54px;flex-shrink:0;background:var(--navy);border-bottom:1px solid var(--teal-b);display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
#vl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:1px;}
#vt{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;}
#xb{background:var(--navy3);border:1px solid var(--teal-b);color:var(--muted);width:30px;height:30px;border-radius:2px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#xb:hover{border-color:var(--teal);color:#fff;}
#pc{flex:1;width:100%;position:relative;}
#np{display:none;flex:1;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#np p{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:center;line-height:2;}
.led{display:inline-block;width:6px;height:6px;border-radius:50%;background:#fff;margin-left:7px;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}
</style>
</head>

  <div><span class="ll" style="background:#3a5a7a;opacity:.6;"></span>Enlace</div>
  <div><span class="lc" style="background:var(--teal);box-shadow:0 0 6px var(--teal);"></span>Locacion 360</div>
  <div><span class="ls" style="background:var(--eta);"></span>Inicio / Final</div>
</div>
<div id="vo">

</div>

function buildPanel(active){
  var panel=document.getElementById('panel');
  var collapsed=panel.dataset.collapsed==='1';
  var stages=['PE 1/4','PE 2/5','PE 3/6','PE 8/11','PE 9/12','PE 10/13','PE7','SH','Shakedown'];
  var html='<div class="ph" onclick="togglePanel()">Tramos de etapa</div><div class="panel-body'+(collapsed?' collapsed':'')+'" style="max-height:400px;">';
  stages.forEach(function(s){var a=active===s;html+='<div class="pr'+(a?' active':'')+'" onclick="clickStage(''+s+'')">'+'<div class="pr-name'+(a?' active':'')+'" style="color:'+(a?'#fff':'var(--muted)')+'">'+s+'</div><div class="pr-dot'+(a?' active':'')+'"></div></div>';});
  html+='</div>';panel.innerHTML=html;
}
function drawRoutes(active){for(var i=0;i<rLayers.length;i++)map.removeLayer(rLayers[i]);rLayers=[];}
function togglePanel(){var p=document.getElementById('panel');p.dataset.collapsed=p.dataset.collapsed==='1'?'0':'1';buildPanel(window._aStage||null);}
function clickStage(name){aStage=(aStage===name)?null:name;window._aStage=aStage;buildPanel(aStage);drawRoutes(aStage);}
function icon(t){return L.divIcon({className:t==="locacion"?"mk-loc":"mk-eta",iconSize:t==="locacion"?[14,14]:[11,11],iconAnchor:t==="locacion"?[7,7]:[5,5]});}
function sigColor(sig){return sig==='Sin señal'?'#e05555':sig!=='Claro y Personal'?'#e09a30':'#00c9a7';}
function renderMarkers(){
  for(var i=0;i<mkrs.length;i++)map.removeLayer(mkrs[i]);mkrs=[];
  var vis=POINTS.filter(function(p){return af==="all"||p.type===af;});
  document.getElementById("hc").textContent=vis.filter(function(p){return p.type==="locacion";}).length+" loc / "+vis.filter(function(p){return p.type==="etapa";}).length+" etapas";
  for(var i=0;i<vis.length;i++){
    var pt=vis[i],loc=pt.type==="locacion";
    var m=L.marker([pt.lat,pt.lon],{icon:icon(pt.type)}).addTo(map);
    var kmStr=pt.km!=null?pt.km.toFixed(1)+' km':'-';
    var sc=sigColor(pt.signal);
    var rows='<div style="display:flex;flex-direction:column;gap:7px;">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;">'
      +'<span style="font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#4a6a8a;">Senal</span>'
      +'<span style="display:flex;align-items:center;gap:5px;font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;color:'+sc+';">'
      +'<span style="width:7px;height:7px;border-radius:50%;background:'+sc+';flex-shrink:0;display:inline-block;"></span>'
      +pt.signal+'</span></div>';
    if(pt.tiempo) rows+='<div style="display:flex;align-items:center;justify-content:space-between;">'
      +'<span style="font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#4a6a8a;">Tiempo</span>'
      +'<span style="font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;color:#fff;">'+pt.tiempo+'</span></div>';
    rows+='<div style="display:flex;align-items:center;justify-content:space-between;">'
      +'<span style="font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#4a6a8a;">Desde largada</span>'
      +'<span style="font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;color:#fff;">'+kmStr+'</span></div>'
      +'</div>';
    var ph='<div class="pop"><div class="ptag'+(loc?'':' e')+'">'+(loc?'Locacion 360':'Etapa')+'</div>'
      +'<div class="pname">'+pt.name+'</div>'
      +'<div class="pcoords">'+pt.lat.toFixed(5)+', '+pt.lon.toFixed(5)+'</div>'
      +'<button class="pbtn'+(loc?'':' e')+'" onclick="openV(''+pt.file+'',''+pt.name+'',''+pt.type+'')">'+(loc?'Ver 360':'Ubicacion')+'</button>'
      +'<div style="border-top:1px solid #ffffff10;"></div>'
      +'<div style="padding:9px 14px 11px;">'+rows+'</div></div>';
    m.bindPopup(ph,{maxWidth:240});mkrs.push(m);
  }
}
function sf(f){af=(af===f&&f!=="all")?"all":f;document.getElementById("fa").className="fb"+(af==="all"?" on":"");document.getElementById("fe").className="fb"+(af==="all"||af==="etapa"?" one":"");document.getElementById("fl").className="fb"+(af==="all"||af==="locacion"?" on":"");renderMarkers();}
function openV(file,name,type){
  map.closePopup();
  document.getElementById("vl").textContent=type==="locacion"?"Locacion 360":"Etapa";
  document.getElementById("vt").textContent=name.toUpperCase();
  document.getElementById("ef").textContent=file;
  var ov=document.getElementById("vo"),pc=document.getElementById("pc"),np=document.getElementById("np");
  ov.classList.add("on");pc.style.display="block";np.style.display="none";
  if(viewer){try{viewer.destroy();}catch(e){}viewer=null;}
  pc.innerHTML='<div id="pano" style="width:100%;height:100%;"></div>';
  var img=new Image();
  img.onload=function(){viewer=pannellum.viewer("pano",{type:"equirectangular",panorama:"fotos/"+file,autoLoad:true,autoRotate:-1.5,compass:false,showControls:true,hfov:100});};
  img.onerror=function(){pc.style.display="none";np.style.display="flex";};
  img.src="fotos/"+file;
}
function cv(){document.getElementById("vo").classList.remove("on");if(viewer){try{viewer.destroy();}catch(e){}viewer=null;}document.getElementById("pc").innerHTML="";}
document.addEventListener("keydown",function(e){if(e.key==="Escape")cv();});
function makeFlag(type){
  var svg=type==='start'
    ?'<svg xmlns="http://www.w3.org/2000/svg" width="20" height="28" viewBox="0 0 20 28"><line x1="2" y1="2" x2="2" y2="26" stroke="#fff" stroke-width="1.5"/><rect x="2" y="2" width="14" height="9" fill="#fff"/><rect x="9" y="2" width="7" height="4.5" fill="#0d1b2e"/><rect x="2" y="6.5" width="7" height="4.5" fill="#0d1b2e"/><rect x="9" y="6.5" width="7" height="4.5" fill="#fff"/></svg>'
    :'<svg xmlns="http://www.w3.org/2000/svg" width="20" height="28" viewBox="0 0 20 28"><line x1="2" y1="2" x2="2" y2="26" stroke="#fff" stroke-width="1.5"/><rect x="2" y="2" width="14" height="9" fill="#fff" opacity="0.9"/></svg>';
  return L.divIcon({html:svg,className:'',iconSize:[20,28],iconAnchor:[2,26]});
}
function addFlags(){
  POINTS.filter(function(p){return p.name.indexOf('Inicio')===0;}).forEach(function(pt){L.marker([pt.lat,pt.lon],{icon:makeFlag('start'),zIndexOffset:500,interactive:false}).addTo(map);});
  POINTS.filter(function(p){return p.name.indexOf('Final')===0;}).forEach(function(pt){L.marker([pt.lat,pt.lon],{icon:makeFlag('finish'),zIndexOffset:500,interactive:false}).addTo(map);});
}
drawRoutes(null);buildPanel(null);renderMarkers();addFlags();
</script>
